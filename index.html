<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子制造业知识图谱</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: rgba(17, 24, 39, 0.85);
  --bg-glass: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #38bdf8;
  --accent-glow: rgba(56, 189, 248, 0.15);

  /* Category colors */
  --color-materials: #f59e0b;
  --color-manufacturing: #22d3ee;
  --color-components: #a78bfa;
  --color-assembly: #34d399;
  --color-testing: #f472b6;
  --color-application: #fb923c;
  --color-standards: #e879f9;
  --color-company: #f87171;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* === Background Grid === */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* === Top Header Bar === */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: linear-gradient(180deg, rgba(10,14,23,0.95) 60%, transparent);
  padding: 16px 24px 20px;
  display: flex; align-items: center; gap: 20px;
  flex-wrap: wrap;
}
.top-bar h1 {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #38bdf8, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
.top-bar h1::before { content: '⚡ '; }
.top-bar .subtitle {
  font-size: 12px; color: var(--text-muted);
  margin-top: -2px;
  -webkit-text-fill-color: var(--text-muted);
}

/* === Search === */
.search-box {
  position: relative; flex: 1; max-width: 360px; min-width: 160px;
}
.search-box input {
  width: 100%; height: 36px;
  padding: 0 12px 0 36px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text-primary);
  font-size: 13px; font-family: inherit;
  outline: none; transition: all 0.2s;
}
.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box .icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px;
}
.search-box .clear-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 16px; display: none; padding: 4px;
}
.search-box .clear-btn.visible { display: block; }

/* === Category Legend === */
.legend-wrapper {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 8px; width: 100%;
}
.legend-item {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px 4px 8px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 11px; color: var(--text-secondary);
  cursor: pointer; transition: all 0.2s;
  user-select: none;
}
.legend-item:hover {
  border-color: var(--border-hover);
  background: rgba(255,255,255,0.06);
}
.legend-item.active { background: rgba(255,255,255,0.08); border-color: var(--text-secondary); }
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.legend-item .count {
  color: var(--text-muted); font-size: 10px; margin-left: 2px;
}

/* === Graph Container === */
#graph-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1;
}
#graph-container svg { width: 100%; height: 100%; }

/* === Stats Counter === */
.stats-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 50;
  display: flex; align-items: center; gap: 24px;
  padding: 8px 24px;
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px; color: var(--text-muted);
}
.stats-bar span { white-space: nowrap; }
.stats-bar .stat-num { color: var(--text-primary); font-weight: 600; }
.stats-bar .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); }

/* === Detail Panel === */
.detail-panel {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 200;
  width: 380px; max-width: 90vw;
  background: var(--bg-card);
  backdrop-filter: blur(24px);
  border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.detail-panel.open { transform: translateX(0); }
.detail-panel .close-btn {
  position: absolute; top: 16px; right: 16px; z-index: 5;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg-glass); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.detail-panel .close-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.detail-panel .panel-header {
  padding: 32px 28px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.detail-panel .panel-category {
  font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 8px;
}
.detail-panel .panel-name {
  font-size: 24px; font-weight: 700;
  line-height: 1.3;
}
.detail-panel .panel-name-en {
  font-size: 13px; color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 4px;
}
.detail-panel .panel-body {
  padding: 20px 28px;
  overflow-y: auto; flex: 1;
}
.detail-panel .panel-section {
  margin-bottom: 20px;
}
.detail-panel .panel-section h3 {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-muted);
  margin-bottom: 8px;
}
.detail-panel .panel-section p {
  font-size: 14px; line-height: 1.7;
  color: var(--text-secondary);
}
.detail-panel .tag-list {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.detail-panel .tag {
  padding: 4px 10px; border-radius: 100px;
  font-size: 11px; background: var(--bg-glass);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.detail-panel .relation-list {
  display: flex; flex-direction: column; gap: 6px;
}
.detail-panel .relation-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: var(--radius-sm);
  background: var(--bg-glass); border: 1px solid var(--border);
  font-size: 13px; color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
}
.detail-panel .relation-item:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--border-hover);
}
.detail-panel .relation-item .rel-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}

/* === SVG Graph Styles === */
.node-group { cursor: pointer; }
.node-circle {
  stroke-width: 2px;
  transition: r 0.2s, stroke-width 0.2s;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}
.node-group:hover .node-circle {
  stroke-width: 3px;
}
.node-label {
  font-size: 11px;
  font-family: 'Noto Sans SC', sans-serif;
  pointer-events: none;
  dominant-baseline: central; text-anchor: middle;
  transition: font-size 0.2s;
}
.node-label-bg {
  fill: rgba(10,14,23,0.6);
  rx: 4;
}
.node-highlight .node-circle { stroke-width: 4px; }
.node-highlight .node-label { font-size: 14px; font-weight: 600; }
.node-dim { opacity: 0.2; }
.node-dim .node-label { opacity: 0; }

.link {
  stroke-opacity: 0.25;
  stroke-width: 1.2px;
  transition: stroke-opacity 0.3s, stroke-width 0.3s;
}
.link-dim { stroke-opacity: 0.05 !important; }
.link-highlight { stroke-opacity: 0.6 !important; stroke-width: 2px !important; }

/* === Tooltip === */
.tooltip {
  position: fixed; z-index: 300;
  padding: 8px 14px;
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px; font-family: 'Noto Sans SC', sans-serif;
  color: var(--text-primary);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-title { font-weight: 600; font-size: 13px; }
.tooltip .tt-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* === Responsive === */
@media (max-width: 768px) {
  .top-bar { padding: 12px 16px 16px; }
  .top-bar h1 { font-size: 16px; }
  .search-box { max-width: none; }
  .detail-panel { width: 100vw; max-width: 100vw; }
  .stats-bar { gap: 12px; padding: 6px 16px; font-size: 11px; flex-wrap: wrap; justify-content: center; }
  .legend-wrapper { gap: 4px; }
  .legend-item { font-size: 10px; padding: 3px 8px 3px 6px; }
}

/* === Smooth scroll === */
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* === Node context button in panel === */
.panel-relations .go-to-node { margin-left: auto; font-size: 16px; opacity: 0.5; }
.relation-item:hover .go-to-node { opacity: 1; }

/* === Responsive tweaks for graph labels === */
@media (max-width: 600px) {
  .node-label { font-size: 9px !important; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-sub"></div>
</div>

<!-- Top Bar -->
<header class="top-bar">
  <div>
    <h1>电子制造业知识图谱</h1>
    <div class="subtitle">Electronic Manufacturing Knowledge Graph</div>
  </div>
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索节点..." autocomplete="off">
    <button class="clear-btn" id="clearBtn">✕</button>
  </div>
  <div class="legend-wrapper" id="legendWrapper"></div>
</header>

<!-- Graph -->
<div id="graph-container"></div>

<!-- Detail Panel -->
<aside class="detail-panel" id="detailPanel">
  <button class="close-btn" id="closePanel">✕</button>
  <div class="panel-header">
    <div class="panel-category" id="panelCategory"></div>
    <div class="panel-name" id="panelName"></div>
    <div class="panel-name-en" id="panelNameEn"></div>
  </div>
  <div class="panel-body">
    <div class="panel-section">
      <h3>描述</h3>
      <p id="panelDesc"></p>
    </div>
    <div class="panel-section">
      <h3>关联节点</h3>
      <div class="relation-list" id="panelRelations"></div>
    </div>
    <div class="panel-section">
      <h3>标签</h3>
      <div class="tag-list" id="panelTags"></div>
    </div>
  </div>
</aside>

<!-- Stats -->
<div class="stats-bar" id="statsBar">
  <span>节点 <span class="stat-num" id="statNodes">0</span></span>
  <span class="dot"></span>
  <span>关系 <span class="stat-num" id="statLinks">0</span></span>
  <span class="dot"></span>
  <span id="statCategory">全部</span>
</div>

<script>
// ============================================================
// DATA — 电子制造业知识图谱
// ============================================================
const CATEGORIES = {
  materials:   { label: '原材料',   color: '#f59e0b',  light: 'rgba(245,158,11,0.15)' },
  manufacturing: { label: '半导体制造', color: '#22d3ee', light: 'rgba(34,211,238,0.15)' },
  components: { label: '电子元器件', color: '#a78bfa', light: 'rgba(167,139,250,0.15)' },
  assembly:   { label: '组装工艺', color: '#34d399', light: 'rgba(52,211,153,0.15)' },
  testing:    { label: '测试与质量', color: '#f472b6', light: 'rgba(244,114,182,0.15)' },
  application:{ label: '应用领域', color: '#fb923c', light: 'rgba(251,146,60,0.15)' },
  standards:  { label: '标准法规', color: '#a855f7', light: 'rgba(168,85,247,0.15)' },
  company:    { label: '头部企业', color: '#f87171', light: 'rgba(248,113,113,0.15)' },
};

const NODES = [
  // === 原材料 ===
  { id:'silicon-wafer', name:'芯片/晶圆', nameEn:'IC Chips & Wafers', cat:'materials',
    desc:'消费/汽车/医疗电子产品的核心有源器件，包括MCU/SoC/存储/电源管理IC/传感器等。电子制造工程师需要理解芯片封装类型（QFP/QFN/BGA/CSP）、芯片工作温度等级（商业/工业/车规）、芯片标识解读（Date Code/Lot Code）以及芯片存储与MSL湿敏等级管控。', tags:['芯片','封装','车规','MSL'] },
  { id:'photoresist', name:'锡膏与助焊剂', nameEn:'Solder Paste & Flux', cat:'materials',
    desc:'SMT组装的核心辅料。锡膏由焊料合金粉末（SAC305/SAC405等）+ 助焊剂载体组成。管控指标：锡粉粒径分布（Type 3/4/5）、粘度、塌陷性、印刷性。助焊剂活性等级（RMA/RA）决定清洗需求。无铅转型后SAC305成为主流，低温SnBi用于热敏感元件。', tags:['锡膏','助焊剂','SAC305','焊接'] },
  { id:'copper-foil', name:'铜箔', nameEn:'Copper Foil', cat:'materials',
    desc:'PCB和FPC的关键导电材料，由电解法或压延法制成。厚度规格从12μm到105μm不等，超薄铜箔（≤12μm）用于HDI和高频高速板。锂电池负极集流体也大量使用铜箔。', tags:['PCB','导电','电解'] },
  { id:'substrate', name:'PCB基板', nameEn:'PCB Substrate', cat:'materials',
    desc:'消费/汽车/医疗电子产品PCB的基材。FR-4（玻纤环氧树脂）最通用，高频材料（Rogers/Taconic）用于射频/天线板，铝基板用于LED/电源板，FPC柔性板用PI（聚酰亚胺）。表面处理：HASL（有铅/无铅）、ENIG（沉金）、OSP（有机保焊膜）、沉锡。选用依据：成本、可靠性、焊接性、环保要求。', tags:['FR-4','高频板','FPC','表面处理'] },
  { id:'solder', name:'焊料', nameEn:'Solder', cat:'materials',
    desc:'电子组装中用于连接元器件与PCB的金属合金。主流无铅焊料SAC305（Sn-3.0Ag-0.5Cu），另有高温焊料（Sn-Sb）和低温焊料（Sn-Bi）。焊膏由焊料粉末和助焊剂混合而成。', tags:['焊接','无铅','SAC305'] },
  { id:'rare-earth', name:'稀土金属', nameEn:'Rare Earth Metals', cat:'materials',
    desc:'电子工业不可或缺的战略材料。钕用于永磁电机（扬声器、硬盘、EV电机），镧用于光学玻璃，钇用于LED荧光粉，镝用于高性能磁材。中国占全球稀土产量60%以上。', tags:['战略材料','永磁','荧光粉'] },

  // === 消费电子制造（替代原半导体制造） ===
  { id:'smt-assembly', name:'SMT贴片组装', nameEn:'SMT Assembly', cat:'manufacturing',
    desc:'消费/汽车/医疗电子产品的核心组装工艺。涵盖锡膏印刷→贴片→回流焊全流程。关键管控：钢网开口设计、贴片机CPH与精度、炉温曲线Profiling、SPI/AOI检测覆盖率。SMT良率直接影响产品成本和交付。', tags:['SMT','贴片','回流焊','钢网'] },
  { id:'box-build', name:'整机组装（Box Build）', nameEn:'Box Build Assembly', cat:'manufacturing',
    desc:'从PCBA到成品整机的完整组装过程。包括结构件装配、螺丝扭力管控（Tory/Torx规格）、点胶/灌胶（UV胶/环氧树脂）、FPC/BTB连接器压接、喇叭/马达/摄像头模组组装、气密性测试。Box Build的自动化程度是衡量工厂能力的关键指标。', tags:['整机组装','扭力','点胶','FPC'] },
  { id:'injection-molding', name:'注塑成型', nameEn:'Injection Molding', cat:'manufacturing',
    desc:'电子产品的塑料结构件（外壳/支架/卡扣）的核心成型工艺。关键参数：温度（料筒/模具）、压力（注射/保压）、速度、冷却时间。常见缺陷：缩水、飞边、熔接痕、翘曲。DOE优化参数窗口，减少试模次数。', tags:['注塑','模具','塑料','参数窗口'] },
  { id:'pcba-testing', name:'PCBA测试', nameEn:'PCBA Testing', cat:'manufacturing',
    desc:'PCBA级的电性能验证。ICT（在线测试）检测元件值/焊接/开路短路，FCT（功能测试）模拟产品实际工作环境验证功能。Boundary Scan（JTAG）用于BGA等不可触及焊点的测试。测试覆盖率（Test Coverage）是DFT的核心目标。', tags:['ICT','FCT','Boundary Scan','测试覆盖率'] },
  { id:'reliability-test', name:'可靠性验证', nameEn:'Reliability Test', cat:'manufacturing',
    desc:'电子产品量产前的可靠性验证。包括：温度循环（TCT，-40~125°C）、湿度偏压（HAST 130°C/85%RH）、振动/机械冲击、跌落、盐雾。汽车电子还需额外做Power Temperature Cycling、TDDB等。MTBF预测与加速寿命模型搭建。', tags:['TCT','HAST','温循','MTBF'] },
  { id:'ipc-quality', name:'IPC品质标准', nameEn:'IPC Quality Standards', cat:'manufacturing',
    desc:'电子组装行业最广泛采用的可接受性标准。IPC-A-610（组件可接受性）三级分类：Class 1消费/Class 2专业/Class 3高可靠性。IPC-7711/7721返工返修标准。IPC-600 PCB验收标准。这些标准是IQC/IPQC/OQC的共同判定依据。', tags:['IPC-A-610','可接受性','Class 3','返工'] },
  { id:'equipment-pm', name:'设备预防维护', nameEn:'Preventive Maintenance', cat:'manufacturing',
    desc:'确保产线设备长期稳定运行的管理体系。TPM（全员生产维护）框架下的自主保养（操作员日常点检）/专业保养（工程师定期维护）/预防保养（基于时间/次数的部件更换）。MTBF/MTTR跟踪、备件安全库存管理、设备停机损失分析。', tags:['TPM','MTBF','MTTR','备件'] },

  // === 电子元器件 ===
  { id:'ic', name:'集成电路', nameEn:'Integrated Circuit (IC)', cat:'components',
    desc:'将晶体管、电阻、电容等元件集成在半导体芯片上的微型电子电路。按功能分为数字IC（CPU、GPU、MCU、存储器）和模拟IC（运放、ADC/DAC、电源管理）。以线宽（nm）衡量工艺先进程度。', tags:['芯片','SoC','数字','模拟'] },
  { id:'pcb', name:'PCB', nameEn:'Printed Circuit Board', cat:'components',

// ============================================================
// GRAPH SETUP
// ============================================================
let selectedNode = null;
let activeCategory = null;
let searchQuery = '';

// Prepare data
const nodeMap = {};
NODES.forEach(n => nodeMap[n.id] = { ...n });
const nodes = NODES.map(n => ({ ...n }));
const links = EDGES.map(e => ({
  source: e.s,
  target: e.t,
  type: e.type,
  ...RELATION_TYPES[e.type]
}));

// Assign sizes based on degree
const degreeCount = {};
links.forEach(l => {
  const s = typeof l.source === 'object' ? l.source.id : l.source;
  const t = typeof l.target === 'object' ? l.target.id : l.target;
  degreeCount[s] = (degreeCount[s] || 0) + 1;
  degreeCount[t] = (degreeCount[t] || 0) + 1;
});
nodes.forEach(n => {
  n.degree = degreeCount[n.id] || 0;
  n.size = 15 + Math.min(n.degree * 3, 18);
});

// D3 setup
const container = document.getElementById('graph-container');
const width = container.clientWidth;
const height = container.clientHeight;

const svg = d3.select('#graph-container')
  .append('svg')
  .attr('width', width)
  .attr('height', height)
  .call(d3.zoom()
    .scaleExtent([0.15, 4])
    .on('zoom', (event) => g.attr('transform', event.transform)));

const g = svg.append('g');

// Arrow markers
const defs = svg.append('defs');
defs.selectAll('marker')
  .data(Object.entries(RELATION_TYPES))
  .enter()
  .append('marker')
  .attr('id', d => `arrow-${d[0]}`)
  .attr('viewBox', '0 -5 10 10')
  .attr('refX', 28)
  .attr('refY', 0)
  .attr('markerWidth', 6)
  .attr('markerHeight', 6)
  .attr('orient', 'auto')
  .append('path')
  .attr('d', 'M0,-5L10,0L0,5')
  .attr('fill', d => CATEGORIES[nodeMap[d[0]]?.cat || 'manufacturing']?.color || '#666')
  .attr('opacity', 0.5);

// Force simulation
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(120))
  .force('charge', d3.forceManyBody().strength(-350))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(d => d.size + 8))
  .alphaDecay(0.02);

// Draw links
const link = g.append('g')
  .selectAll('line')
  .data(links)
  .join('line')
  .attr('class', 'link')
  .attr('stroke', d => CATEGORIES[nodeMap[d.source.id || d.source]?.cat]?.color || '#666')
  .attr('marker-end', d => `url(#arrow-${d.type})`)
  .attr('stroke-dasharray', d => d.type === 'competes_with' ? '4,3' : null);

// Draw link labels
const linkLabel = g.append('g')
  .selectAll('text')
  .data(links)
  .join('text')
  .text(d => d.label || '')
  .attr('fill', '#64748b')
  .attr('font-size', 8)
  .attr('text-anchor', 'middle')
  .attr('dominant-baseline', 'central')
  .attr('opacity', 0.4)
  .style('pointer-events', 'none');

// Draw nodes
const node = g.append('g')
  .selectAll('g')
  .data(nodes)
  .join('g')
  .attr('class', 'node-group')
  .call(d3.drag()
    .on('start', (event, d) => {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    })
    .on('drag', (event, d) => {
      d.fx = event.x;
      d.fy = event.y;
    })
    .on('end', (event, d) => {
      if (!event.active) simulation.alphaTarget(0);
      if (!d.pinned) { d.fx = null; d.fy = null; }
    }));

// Node circles
node.append('circle')
  .attr('class', 'node-circle')
  .attr('r', d => d.size)
  .attr('fill', d => CATEGORIES[d.cat]?.light || 'rgba(100,100,100,0.2)')
  .attr('stroke', d => CATEGORIES[d.cat]?.color || '#666');

// Node inner icon/letter
node.append('text')
  .text(d => d.name.charAt(0))
  .attr('fill', d => CATEGORIES[d.cat]?.color || '#ccc')
  .attr('font-size', d => Math.max(d.size * 0.55, 8))
  .attr('font-weight', 700)
  .attr('text-anchor', 'middle')
  .attr('dominant-baseline', 'central')
  .style('pointer-events', 'none')
  .style('font-family', "'Noto Sans SC', sans-serif");

// Node labels
node.append('text')
  .text(d => d.name)
  .attr('class', 'node-label')
  .attr('fill', '#f1f5f9')
  .attr('dy', d => d.size + 14)
  .attr('font-size', d => Math.min(d.size * 0.9, 13));

// Hover
node.on('mouseenter', function(event, d) {
  const tt = document.getElementById('tooltip');
  tt.querySelector('.tt-title').textContent = d.name;
  tt.querySelector('.tt-sub').textContent = `${CATEGORIES[d.cat]?.label} · ${d.nameEn}`;
  tt.style.left = (event.clientX + 14) + 'px';
  tt.style.top = (event.clientY - 10) + 'px';
  tt.classList.add('visible');

  // Highlight
  const connectedIds = new Set();
  connectedIds.add(d.id);
  links.forEach(l => {
    const lid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (lid === d.id) connectedIds.add(tid);
    if (tid === d.id) connectedIds.add(lid);
  });
  node.each(function(n) {
    const el = d3.select(this);
    if (connectedIds.has(n.id)) {
      el.classed('node-highlight', n.id === d.id);
      el.classed('node-dim', false);
    } else {
      el.classed('node-dim', true);
      el.classed('node-highlight', false);
    }
  });
  link.each(function(l) {
    const lid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    const isConnected = (lid === d.id || tid === d.id);
    d3.select(this).classed('link-highlight', isConnected).classed('link-dim', !isConnected);
  });
  linkLabel.attr('opacity', l => {
    const lid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return (lid === d.id || tid === d.id) ? 0.7 : 0.1;
  });
})
.on('mouseleave', function() {
  document.getElementById('tooltip').classList.remove('visible');
  node.classed('node-highlight', false).classed('node-dim', false);
  link.classed('link-highlight', false).classed('link-dim', false);
  linkLabel.attr('opacity', 0.4);
});

// Click
node.on('click', function(event, d) {
  event.stopPropagation();
  showDetail(d);
});

svg.on('click', () => closeDetail());

// Simulation tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
  linkLabel
    .attr('x', d => (d.source.x + d.target.x) / 2)
    .attr('y', d => (d.source.y + d.target.y) / 2);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Resize
window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  svg.attr('width', w).attr('height', h);
  simulation.force('center', d3.forceCenter(w / 2, h / 2));
  simulation.alpha(0.3).restart();
});

// ============================================================
// LEGEND
// ============================================================
function buildLegend() {
  const wrapper = document.getElementById('legendWrapper');
  const counts = {};
  nodes.forEach(n => { counts[n.cat] = (counts[n.cat] || 0) + 1; });
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const item = document.createElement('span');
    item.className = 'legend-item';
    if (activeCategory === key) item.classList.add('active');
    item.innerHTML = `
      <span class="legend-dot" style="background:${cat.color}"></span>
      ${cat.label}
      <span class="count">${counts[key] || 0}</span>
    `;
    item.dataset.cat = key;
    item.addEventListener('click', () => toggleCategory(key));
    wrapper.appendChild(item);
  });
}

function toggleCategory(cat) {
  if (activeCategory === cat) {
    activeCategory = null;
  } else {
    activeCategory = cat;
  }
  updateFilters();
}

function updateFilters() {
  // Update legend UI
  document.querySelectorAll('.legend-item').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === activeCategory);
  });

  // Update nodes
  node.each(function(n) {
    const visible = !activeCategory || n.cat === activeCategory;
    d3.select(this).style('display', visible ? null : 'none');
  });

  // Update links
  link.each(function(l) {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    const sVisible = !activeCategory || (nodeMap[sid]?.cat === activeCategory);
    const tVisible = !activeCategory || (nodeMap[tid]?.cat === activeCategory);
    d3.select(this).style('display', (sVisible && tVisible) ? null : 'none');
  });
  linkLabel.style('display', link.style('display'));

  // Apply search
  applySearch();

  // Update stats
  const visibleNodes = nodes.filter(n => !activeCategory || n.cat === activeCategory);
  document.getElementById('statNodes').textContent = visibleNodes.length;
  document.getElementById('statCategory').textContent = activeCategory
    ? CATEGORIES[activeCategory]?.label : '全部';
}

// ============================================================
// SEARCH
// ============================================================
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  clearBtn.classList.toggle('visible', searchQuery.length > 0);
  applySearch();
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  clearBtn.classList.remove('visible');
  applySearch();
});

function applySearch() {
  if (!searchQuery) {
    node.each(function() {
      d3.select(this).style('opacity', null);
    });
    return;
  }

  const matched = new Set();
  nodes.forEach(n => {
    if (n.name.toLowerCase().includes(searchQuery) ||
        n.nameEn.toLowerCase().includes(searchQuery) ||
        (n.tags || []).some(t => t.toLowerCase().includes(searchQuery))) {
      matched.add(n.id);
    }
  });

  // Include neighbors of matched nodes
  const expanded = new Set(matched);
  links.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (matched.has(sid)) expanded.add(tid);
    if (matched.has(tid)) expanded.add(sid);
  });

  node.each(function(n) {
    const el = d3.select(this);
    if (expanded.has(n.id)) {
      el.style('opacity', null);
      el.classed('node-highlight', matched.has(n.id));
    } else {
      el.style('opacity', 0.12);
      el.classed('node-highlight', false);
    }
  });

  link.each(function(l) {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    const visible = expanded.has(sid) && expanded.has(tid);
    d3.select(this).style('opacity', visible ? null : 0.05);
  });
  linkLabel.attr('opacity', function(l) {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    const visible = expanded.has(sid) && expanded.has(tid);
    return visible ? 0.4 : 0.05;
  });
}

// ============================================================
// DETAIL PANEL
// ============================================================
function showDetail(d) {
  selectedNode = d;
  const panel = document.getElementById('detailPanel');
  const cat = CATEGORIES[d.cat];

  document.getElementById('panelCategory').textContent = cat.label;
  document.getElementById('panelCategory').style.color = cat.color;
  document.getElementById('panelName').textContent = d.name;
  document.getElementById('panelNameEn').textContent = d.nameEn;
  document.getElementById('panelDesc').textContent = d.desc;

  // Tags
  const tagsEl = document.getElementById('panelTags');
  tagsEl.innerHTML = (d.tags || []).map(t =>
    `<span class="tag" style="border-color:${cat.color}30;color:${cat.color}">${t}</span>`
  ).join('');

  // Relations
  const relEl = document.getElementById('panelRelations');
  const connected = [];
  links.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid === d.id) {
      connected.push({ id: tid, rel: l.label || '关联', dir: '→' });
    } else if (tid === d.id) {
      const reverseLabel = l.type === 'competes_with' ? (l.label || '竞争') : '被' + (l.label || '关联');
      connected.push({ id: sid, rel: reverseLabel, dir: '←' });
    }
  });

  if (connected.length === 0) {
    relEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px">暂无关联节点</div>';
  } else {
    relEl.innerHTML = connected.map(c => {
      const n = nodeMap[c.id];
      if (!n) return '';
      const ccat = CATEGORIES[n.cat];
      return `<div class="relation-item" data-id="${n.id}">
        <span class="rel-dot" style="background:${ccat?.color || '#666'}"></span>
        <span style="flex:1"><strong>${n.name}</strong></span>
        <span style="color:var(--text-muted);font-size:11px">${c.rel}</span>
        <span class="go-to-node">→</span>
      </div>`;
    }).join('');

    relEl.querySelectorAll('.relation-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        const n = nodes.find(x => x.id === id);
        if (n) showDetail(n);
      });
    });
  }

  panel.classList.add('open');

  // Highlight the node
  svg.selectAll('.node-highlight').classed('node-highlight', false);
  node.each(function(n) {
    if (n.id === d.id) d3.select(this).classed('node-highlight', true);
  });
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  svg.selectAll('.node-highlight').classed('node-highlight', false);
}

document.getElementById('closePanel').addEventListener('click', closeDetail);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    searchInput.focus();
  }
});

// ============================================================
// INIT
// ============================================================
buildLegend();
document.getElementById('statNodes').textContent = nodes.length;
document.getElementById('statLinks').textContent = links.length;
</script>
